site_name: omnipath-metabo
site_url: https://saezlab.github.io/omnipath-metabo
theme:
    name: material
    favicon: assets/favicon.ico
    icon:
        logo: material/database
    font:
        text: Raleway
    features:
    -   content.code.copy
    -   navigation.tabs
    -   navigation.instant
    -   navigation.footer
    palette:
    -   media: "(prefers-color-scheme: light)"
        scheme: default
        primary: custom
        accent: custom
        toggle:
            icon: material/brightness-7
            name: Switch to dark mode
    -   media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: custom
        accent: custom
        toggle:
            icon: material/brightness-4
            name: Switch to light mode

extra_css:
-   assets/omnipath-theme.css

nav:
-   Home: index.md
-   Installation: installation.md
-   Quickstart: quickstart.md
-   Vignettes:
    -   Overview: vignettes/index.md
    -   COSMOS PKN: vignettes/cosmos-pkn.md
-   API Reference: reference/index.md
-   About: about.md

markdown_extensions:
-   admonition
-   attr_list
-   md_in_html
-   pymdownx.details
-   pymdownx.emoji
-   pymdownx.highlight
-   pymdownx.inlinehilite
-   pymdownx.snippets
-   pymdownx.superfences
-   pymdownx.tabbed

plugins:
-   search
-   mkdocstrings:
        default_handler: python
        handlers:
            python:
                options:
                    annotations_path: brief
                    docstring_style: google
                    heading_level: 3
                    modernize_annotations: true
                    show_category_heading: true
                    show_object_full_path: false
                    show_root_toc_entry: true
                    show_signature: true
                    show_signature_annotations: false
                    signature_crossrefs: true

copyright: "&copy; 2025-2026 Saez-Rodriguez group, Heidelberg University Hospital"
